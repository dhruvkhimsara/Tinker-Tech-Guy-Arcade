<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Runner</title>
    <style>
        :root {
            --bg-dark: #050505;
            --panel-dark: #141416;
            --border-color: #27272a;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --accent-red: #ef4444;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        /* --- BLANK SETUP SCREEN --- */
        #setup-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        .box {
            background-color: var(--panel-dark);
            padding: 40px;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        input {
            width: 100%;
            background: #000;
            color: #fff;
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            margin-top: 15px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus {
            border-color: var(--text-muted);
        }

        .btn {
            display: inline-block;
            background: #fff;
            color: #000;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
            user-select: none;
        }

        /* --- GAME CONTAINER --- */
        #game-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* --- GLOWING RED EXIT BUTTON --- */
        #exit-btn {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(20, 20, 22, 0.75);
            border: 1px solid var(--border-color);
            border-top: none;
            color: var(--text-muted);
            padding: 6px 24px;
            border-radius: 0 0 12px 12px;
            font-weight: 800;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            z-index: 9999;
            backdrop-filter: blur(6px);
            opacity: 0.15;
            transition: all 0.2s ease;
        }

        #exit-btn:hover {
            opacity: 1;
            color: var(--accent-red);
            border-color: var(--accent-red);
            background-color: rgba(20, 20, 22, 0.9);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="box">
            <h2 style="margin:0; letter-spacing: 1px;">HTML RUNNER</h2>
            <p style="color:var(--text-muted); font-size:0.9rem; margin-top: 10px;">Type the filename of the game inside your Games folder:</p>
            <input type="text" id="game-input" placeholder="e.g., Slope.html" onkeydown="if(event.key==='Enter') launchFromInput()">
            <div class="btn" onclick="launchFromInput()">LAUNCH</div>
        </div>
    </div>

    <div id="game-screen">
        <button id="exit-btn" onclick="exitGame()">EXIT</button>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        const gameFrame = document.getElementById('game-frame');
        const setupScreen = document.getElementById('setup-screen');
        const gameScreen = document.getElementById('game-screen');

        // Automatically read the URL query parameter on page load
        // Example: launcher.html?game=Slope.html
        const urlParams = new URLSearchParams(window.location.search);
        const gameParam = urlParams.get('game');
        
        if (gameParam) {
            loadGame(gameParam);
        }

        function launchFromInput() {
            const gameName = document.getElementById('game-input').value.trim();
            if (gameName) loadGame(gameName);
        }

        function loadGame(filename) {
            // Target the root Games folder natively
            gameFrame.src = "Games/" + filename + "?t=" + new Date().getTime();
            setupScreen.style.display = 'none';
            gameScreen.style.display = 'block';
            setTimeout(() => gameFrame.focus(), 100);
        }

        function exitGame() {
            gameFrame.src = "";
            gameScreen.style.display = 'none';
            setupScreen.style.display = 'flex';
            document.getElementById('game-input').value = "";
            
            // Wipe the URL parameters cleanly without reloading the browser
            if (window.location.search) {
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }
    </script>
</body>
</html>
