<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Shooter</title>
    <style>
        :root {
            --bg-black: #050505;
            --accent-green: #00ff88;
            --panel-grey: #141416;
            --text-muted: #a1a1aa;
            --border-color: #27272a;
            --p1-color: #00e5ff;
            --p2-color: #ff3366;
        }

        html, body {
            background-color: #000000;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
        }

        /* --- Updated Responsive Wrapper --- */
        #game-wrapper {
            width: 100%;
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 16 / 9;
            background-color: var(--bg-black);
            display: flex;
            flex-direction: column;
            border: 1px solid #ffffff; 
            box-sizing: border-box;
            position: relative;
        }

        #game-controls {
            height: 90px;
            background-color: var(--panel-grey);
            border-bottom: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 40px;
            box-sizing: border-box;
            flex-shrink: 0;
            z-index: 20;
        }

        .control-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .label {
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
        }

        .btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover, .btn.active {
            color: #ffffff;
            border-color: var(--accent-green);
            background-color: rgba(0, 255, 136, 0.05);
        }

        .btn.active {
            box-shadow: 0 0 12px rgba(0, 255, 136, 0.2);
        }

        #screen-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent-green);
            display: none;
            z-index: 10;
            text-align: center;
        }
        
        #screen-overlay span {
            display: block;
            font-size: 1.5rem;
            color: #ffffff;
            margin-top: 15px;
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }

        #canvas-container {
            flex: 1;
            background-color: var(--bg-black);
            position: relative;
            margin: 0;
            padding: 0;
        }

        canvas {
            display: block;
            background-color: var(--bg-black);
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="game-controls">
            <div class="control-group">
                <span class="label">Mode:</span>
                <button id="btn-1p" class="btn active" onclick="setMode(1)">1 Player</button>
                <button id="btn-2p" class="btn" onclick="setMode(2)">2 Players</button>
            </div>

            <div class="control-group" id="difficulty-wrapper">
                <span class="label">AI Difficulty:</span>
                <button id="ai-easy" class="btn active" onclick="setDifficulty('easy')">Easy</button>
                <button id="ai-moderate" class="btn" onclick="setDifficulty('moderate')">Moderate</button>
                <button id="ai-hard" class="btn" onclick="setDifficulty('hard')">Hard</button>
                <button id="ai-insane" class="btn" onclick="setDifficulty('insane')">Insane</button>
            </div>
        </div>

        <div id="canvas-container">
            <div id="screen-overlay">
                <div id="winner-text">P1 WINS</div>
                <span>Preparing Next Round...</span>
            </div>
            <canvas id="gameCanvas"></canvas>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('screen-overlay');
    const winnerText = document.getElementById('winner-text');

    // --- SYSTEM VARIABLES ---
    let gameMode = 1; 
    let aiDifficulty = 'easy';
    let gameOver = false;
    let matchStarted = false; 
    let particles = [];
    let stars = [];

    // Movement Tracking States Only
    const inputEngine = {
        KeyW: false, KeyA: false, KeyS: false, KeyD: false,
        ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false
    };

    // --- INPUT LISTENERS WITH KEYDOWN SINGLE-SHOT INJECTION ---
    window.addEventListener('keydown', e => { 
        if (e.code in inputEngine || e.code === 'Space') {
            e.preventDefault();
        }

        // Set movement track flags to true
        if (e.code in inputEngine) {
            inputEngine[e.code] = true;
            matchStarted = true; // Any movement wakes up the game
        }
        
        // CRITICAL FIX: Only fire if the browser says this isn't an automated repeat hold event
        if (!e.repeat && !gameOver) {
            if (gameMode === 1) {
                // 1 Player: Arrows to move, Space to shoot
                if (e.code === 'Space') {
                    matchStarted = true;
                    fireBullet(p1, 1);
                }
            } else {
                // 2 Player: P1 on left uses Mouse Click, P2 on right uses Space bar
                if (e.code === 'Space') {
                    matchStarted = true;
                    fireBullet(p2, -1);
                }
            }
        }
    });

    // Mouse/Trackpad click hook for P1 in Multiplayer mode
    window.addEventListener('mousedown', e => {
        if (!gameOver && gameMode === 2) {
            matchStarted = true;
            fireBullet(p1, 1);
        }
    });

    window.addEventListener('keyup', e => { 
        if (e.code in inputEngine) inputEngine[e.code] = false;
    });

    window.addEventListener('blur', () => {
        for (let code in inputEngine) inputEngine[code] = false;
    });

    // --- ENTITY CONFIGURATIONS ---
    const shipW = 45;
    const shipH = 45;
    const maxHealth = 10;
    const moveSpeed = 8;
    const bulletSpeed = 22;

    let p1 = { x: 0, y: 0, hp: maxHealth, color: '#00e5ff', lastShot: 0, fireCooldown: 200 };
    let p2 = { x: 0, y: 0, hp: maxHealth, color: '#ff3366', lastShot: 0, fireCooldown: 200 };
    let bullets = [];

    const aiConfig = {
        easy:     { speed: 3.5, cooldown: 1300, dodgeChance: 0.25, trackWeight: 0.2, deadzone: 10 },
        moderate: { speed: 6.0, cooldown: 750,  dodgeChance: 0.60, trackWeight: 0.5, deadzone: 7 },
        hard:     { speed: 10.0, cooldown: 400,  dodgeChance: 0.88, trackWeight: 1.0, deadzone: 4 },
        insane:   { speed: 15.5, cooldown: 180,  dodgeChance: 0.98, trackWeight: 2.0, deadzone: 2 } 
    };

    let aiDodgeTargetY = null;
    let aiIdleTimer = 0;
    let aiIdleOffset = 0;

    function initPositions() {
        canvas.width = 1918; 
        canvas.height = 986; 

        stars = [];
        for(let i=0; i<100; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 1,
                speed: Math.random() * 0.5 + 0.1
            });
        }
        resetMatch();
    }

    function setMode(mode) {
        gameMode = mode;
        document.getElementById('btn-1p').classList.toggle('active', mode === 1);
        document.getElementById('btn-2p').classList.toggle('active', mode === 2);
        document.getElementById('difficulty-wrapper').style.opacity = mode === 1 ? '1' : '0.2';
        document.getElementById('difficulty-wrapper').style.pointerEvents = mode === 1 ? 'auto' : 'none';
        resetMatch();
    }

    function setDifficulty(diff) {
        aiDifficulty = diff;
        ['easy', 'moderate', 'hard', 'insane'].forEach(d => {
            document.getElementById(`ai-${d}`).classList.toggle('active', d === diff);
        });
        resetMatch();
    }

    function resetMatch() {
        p1.hp = maxHealth; p2.hp = maxHealth;
        p1.x = 200; p1.y = canvas.height / 2 - shipH / 2;
        p2.x = canvas.width - 200 - shipW; p2.y = canvas.height / 2 - shipH / 2;
        bullets = []; particles = [];
        gameOver = false; matchStarted = false; 
        aiDodgeTargetY = null; aiIdleTimer = 0;
        overlay.style.display = 'none';
        
        for (let code in inputEngine) inputEngine[code] = false;
    }

    function fireBullet(shooter, direction) {
        const now = Date.now();
        if (now - shooter.lastShot >= shooter.fireCooldown) {
            bullets.push({
                x: direction === 1 ? shooter.x + shipW : shooter.x,
                y: shooter.y + shipH / 2,
                vx: direction * bulletSpeed,
                color: shooter.color,
                owner: shooter === p1 ? 'p1' : 'p2',
                w: 24, h: 6
            });
            shooter.lastShot = now;
        }
    }

    function triggerParticles(x, y, color) {
        for (let i = 0; i < 20; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 15,
                vy: (Math.random() - 0.5) * 15,
                size: Math.random() * 4 + 2,
                color: color,
                life: 1.0
            });
        }
    }

    function updatePhysics() {
        if (gameOver) {
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            });
            return;
        }

        stars.forEach(s => {
            s.x -= s.speed;
            if (s.x < 0) s.x = canvas.width;
        });

        // --- SHIP MOVEMENT STEP LOGIC ---
        if (matchStarted) {
            if (gameMode === 1) {
                // Human (Player 1) on Arrow Keys
                if (inputEngine.ArrowUp && p1.y > 0) p1.y -= moveSpeed;
                if (inputEngine.ArrowDown && p1.y < canvas.height - shipH) p1.y += moveSpeed;
                if (inputEngine.ArrowLeft && p1.x > 0) p1.x -= moveSpeed;
                if (inputEngine.ArrowRight && p1.x < canvas.width / 2 - shipW - 10) p1.x += moveSpeed;
            } else {
                // Player 1 on WASD
                if (inputEngine.KeyW && p1.y > 0) p1.y -= moveSpeed;
                if (inputEngine.KeyS && p1.y < canvas.height - shipH) p1.y += moveSpeed;
                if (inputEngine.KeyA && p1.x > 0) p1.x -= moveSpeed;
                if (inputEngine.KeyD && p1.x < canvas.width / 2 - shipW - 10) p1.x += moveSpeed;

                // Player 2 on Arrow Keys
                if (inputEngine.ArrowUp && p2.y > 0) p2.y -= moveSpeed;
                if (inputEngine.ArrowDown && p2.y < canvas.height - shipH) p2.y += moveSpeed;
                if (inputEngine.ArrowLeft && p2.x > canvas.width / 2 + 10) p2.x -= moveSpeed;
                if (inputEngine.ArrowRight && p2.x < canvas.width - shipW) p2.x += moveSpeed;
            }
        }

        // --- ACTIVE CPU EVASION & STRAT MATRIX ---
        if (gameMode === 1 && matchStarted) {
            let conf = aiConfig[aiDifficulty];
            
            // Track human bullets that are approaching the AI's zone
            let playerBullets = bullets.filter(b => b.owner === 'p1');
            let imminentThreat = null;

            for (let b of playerBullets) {
                let framesToReach = (p2.x - b.x) / b.vx;
                if (framesToReach > 0 && framesToReach < 35) {
                    let predictedBulletY = b.y;
                    if (predictedBulletY >= p2.y - 25 && predictedBulletY <= p2.y + shipH + 25) {
                        imminentThreat = b;
                        break; 
                    }
                }
            }

            let targetY = p1.y + (shipH / 2);

            if (imminentThreat) {
                // Threat Detected: Choose dodging coordinates
                if (aiDodgeTargetY === null) {
                    if (Math.random() < conf.dodgeChance) {
                        let spaceAbove = p2.y;
                        let spaceBelow = canvas.height - (p2.y + shipH);
                        
                        if (spaceAbove > spaceBelow) {
                            aiDodgeTargetY = Math.max(40, p2.y - 170); 
                        } else {
                            aiDodgeTargetY = Math.min(canvas.height - shipH - 40, p2.y + 170); 
                        }
                    } else {
                        aiDodgeTargetY = p2.y; // Fail to react (human error simulation)
                    }
                }
                targetY = aiDodgeTargetY;
            } else {
                aiDodgeTargetY = null;

                // Humanized positioning drift: don't sit directly on top of human path lines
                aiIdleTimer--;
                if (aiIdleTimer <= 0) {
                    aiIdleOffset = (Math.random() * 160) - 80; 
                    aiIdleTimer = Math.random() * 20 + 20;
                }
                targetY += aiIdleOffset;
            }

            // Move AI smoothly toward target coordinate using calculated weights
            let aiCenterY = p2.y + (shipH / 2);
            let diffY = targetY - aiCenterY;

            if (Math.abs(diffY) > conf.deadzone) {
                let moveY = diffY * conf.trackWeight;
                if (moveY > conf.speed) moveY = conf.speed;
                if (moveY < -conf.speed) moveY = -conf.speed;
                p2.y += moveY;
            }

            if (p2.y < 0) p2.y = 0;
            if (p2.y > canvas.height - shipH) p2.y = canvas.height - shipH;

            // Firing conditions (AI only fires when it's not performing an emergency dodge maneuver)
            if (!imminentThreat) {
                let currentAlignment = Math.abs((p1.y + shipH / 2) - (p2.y + shipH / 2));
                if (currentAlignment < 65 || aiDifficulty === 'insane') {
                    const now = Date.now();
                    if (now - p2.lastShot >= conf.cooldown) {
                        bullets.push({
                            x: p2.x, y: p2.y + shipH / 2,
                            vx: -bulletSpeed, color: p2.color,
                            owner: 'p2', w: 24, h: 6
                        });
                        p2.lastShot = now;
                    }
                }
            }
        }

        // --- PROJECTILE & IMPACT LOOPS ---
        if (matchStarted) {
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.x += b.vx;

                if (b.x < 0 || b.x > canvas.width) {
                    bullets.splice(i, 1);
                    continue;
                }

                // Impact Player 1
                if (b.owner === 'p2' && b.x < p1.x + shipW && b.x + b.w > p1.x && b.y < p1.y + shipH && b.y + b.h > p1.y) {
                    p1.hp -= 1;
                    triggerParticles(b.x, b.y, p1.color);
                    bullets.splice(i, 1);
                    checkDeath();
                    continue;
                }

                // Impact Player 2 / AI
                if (b.owner === 'p1' && b.x + b.w > p2.x && b.x < p2.x + shipW && b.y < p2.y + shipH && b.y + b.h > p2.y) {
                    p2.hp -= 1;
                    triggerParticles(b.x + b.w, b.y, p2.color);
                    bullets.splice(i, 1);
                    checkDeath();
                }
            }
        }

        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            if (p.life <= 0) particles.splice(i, 1);
        });
    }

    function checkDeath() {
        if (p1.hp <= 0 || p2.hp <= 0) {
            gameOver = true;
            if (p1.hp <= 0 && p2.hp <= 0) winnerText.innerText = "DRAW!";
            else if (p1.hp <= 0) winnerText.innerText = gameMode === 1 ? "AI WINS!" : "PLAYER 2 WINS!";
            else winnerText.innerText = "PLAYER 1 WINS!";
            
            winnerText.style.color = p1.hp <= 0 ? p2.color : p1.color;
            overlay.style.display = 'block';
            setTimeout(resetMatch, 4000);
        }
    }

    // --- RENDERING CORE ---
    function drawShip(x, y, color, direction) {
        ctx.save();
        ctx.fillStyle = color;
        ctx.shadowBlur = 15;
        ctx.shadowColor = color;
        
        ctx.beginPath();
        if (direction === 1) { 
            ctx.moveTo(x, y);
            ctx.lineTo(x + shipW, y + shipH / 2);
            ctx.lineTo(x, y + shipH);
            ctx.lineTo(x + shipW * 0.3, y + shipH / 2);
        } else { 
            ctx.moveTo(x + shipW, y);
            ctx.lineTo(x, y + shipH / 2);
            ctx.lineTo(x + shipW, y + shipH);
            ctx.lineTo(x + shipW * 0.7, y + shipH / 2);
        }
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        if (direction === 1) {
            ctx.arc(x + 5, y + shipH / 2, Math.random() * 4 + 4, 0, Math.PI * 2);
        } else {
            ctx.arc(x + shipW - 5, y + shipH / 2, Math.random() * 4 + 4, 0, Math.PI * 2);
        }
        ctx.fill();
        ctx.restore();
    }

    function drawHealthBar(x, y, hp, color, alignRight) {
        const boxWidth = 25;
        const boxSpacing = 6;
        const totalWidth = (boxWidth * maxHealth) + (boxSpacing * (maxHealth - 1));
        
        let startX = alignRight ? x - totalWidth : x;

        for (let i = 0; i < maxHealth; i++) {
            ctx.fillStyle = i < hp ? color : '#1a1a1c';
            if (i < hp) {
                ctx.shadowBlur = 10;
                ctx.shadowColor = color;
            } else {
                ctx.shadowBlur = 0;
            }
            
            let blockIndex = alignRight ? (maxHealth - 1 - i) : i;
            ctx.fillRect(startX + (blockIndex * (boxWidth + boxSpacing)), y, boxWidth, 18);
        }
        ctx.shadowBlur = 0;
    }

    function drawScreen() {
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
        stars.forEach(s => ctx.fillRect(s.x, s.y, s.size, s.size));

        ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
        ctx.lineWidth = 4;
        ctx.setLineDash([20, 20]);
        ctx.beginPath();
        ctx.moveTo(canvas.width / 2, 0);
        ctx.lineTo(canvas.width / 2, canvas.height);
        ctx.stroke();
        ctx.setLineDash([]); 

        drawHealthBar(40, 30, p1.hp, p1.color, false);
        drawHealthBar(canvas.width - 40, 30, p2.hp, p2.color, true);

        if (!matchStarted && !gameOver) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.font = "800 1.2rem -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
            ctx.textAlign = "center";
            ctx.letterSpacing = "2px";
            if (gameMode === 1) {
                ctx.fillText("PRESS ARROWS OR SPACE TO ENGAGE AI", canvas.width / 2, canvas.height / 2 + 100);
            } else {
                ctx.fillText("PRESS ANY ACTION KEY OR CLICK MOUSE TO ENGAGE MATCH", canvas.width / 2, canvas.height / 2 + 100);
            }
        }

        if (!gameOver || p1.hp > 0) drawShip(p1.x, p1.y, p1.color, 1);
        if (!gameOver || p2.hp > 0) drawShip(p2.x, p2.y, p2.color, -1);

        bullets.forEach(b => {
            ctx.fillStyle = b.color;
            ctx.shadowBlur = 12;
            ctx.shadowColor = b.color;
            ctx.fillRect(b.x, b.y - b.h/2, b.w, b.h);
        });
        ctx.shadowBlur = 0;

        particles.forEach(p => {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, p.size, p.size);
        });
        ctx.globalAlpha = 1.0;
    }

    function gameLoop() {
        updatePhysics();
        drawScreen();
        requestAnimationFrame(gameLoop);
    }

    window.onload = () => {
        initPositions();
        gameLoop();
    };
    </script>
</body>
</html>
