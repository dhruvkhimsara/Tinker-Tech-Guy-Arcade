<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Racer</title>
    <style>
        :root {
            --bg-black: #050505;
            --accent-green: #00ff88;
            --panel-grey: #141416;
            --text-muted: #a1a1aa;
            --border-color: #27272a;
        }

        html, body {
            background-color: #000000;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        #game-wrapper {
            width: 1920px;
            height: 1080px;
            background-color: var(--bg-black);
            display: flex;
            flex-direction: column;
            border: 1px solid #ffffff; 
            box-sizing: border-box;
            position: relative;
        }

        #game-controls {
            height: 90px;
            background-color: var(--panel-grey);
            border-bottom: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            flex-shrink: 0;
            z-index: 20;
        }

        .control-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .label {
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
        }

        .hud-value {
            color: #ffffff;
            font-weight: 800;
            font-size: 1.1rem;
            background: #000000;
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            min-width: 70px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover, .btn.active {
            color: #ffffff;
            border-color: var(--accent-green);
            background-color: rgba(0, 255, 136, 0.05);
        }

        .btn.active {
            box-shadow: 0 0 12px rgba(0, 255, 136, 0.2);
        }

        #canvas-container {
            flex: 1;
            background-color: #166534;
            position: relative;
            margin: 0;
            padding: 0;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(5, 5, 5, 0.98);
            z-index: 100;
            display: flex;
            flex-direction: column;
            padding: 60px;
            box-sizing: border-box;
        }

        .menu-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .menu-title {
            font-size: 4.5rem;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 4px;
            margin: 0;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 450px 1fr;
            gap: 50px;
            flex: 1;
            min-height: 0;
        }

        .setup-pane {
            background-color: var(--panel-grey);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .pane-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-row {
            display: flex;
            gap: 10px;
        }

        .btn-row .btn {
            flex: 1;
        }

        .tracks-pane {
            background-color: var(--panel-grey);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .tracks-list {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        .track-card {
            background: #09090b;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .track-card:hover, .track-card.selected {
            border-color: var(--accent-green);
            background: rgba(0, 255, 136, 0.02);
        }

        .track-card.selected {
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.15);
        }

        .track-name {
            font-size: 1.5rem;
            font-weight: 900;
            color: #ffffff;
            margin: 0;
            text-align: center;
        }

        .launch-container {
            margin-top: auto;
            padding-top: 20px;
        }

        .btn-launch {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            color: #ffffff;
            border-color: var(--accent-green);
            background: rgba(0, 255, 136, 0.05);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
        }

        .btn-launch:hover {
            background: rgba(0, 255, 136, 0.15);
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.3);
        }

        #status-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 30px rgba(0,0,0,0.9);
            z-index: 10;
            pointer-events: none;
            display: none;
            text-transform: uppercase;
            text-align: center;
            width: 90%;
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="game-controls">
            <button class="btn" onclick="exitToMainMenu()">◄ Homepage Menu</button>
            
            <div class="control-group">
                <span class="label" id="hud-p1-label">Lap Display:</span>
                <div class="hud-value" id="hud-p1-lap">0/3</div>
                <span class="label" id="hud-p1-time-label">Timer Clock:</span>
                <div class="hud-value" id="hud-p1-time">00.00</div>
            </div>

            <div class="control-group" id="hud-p2-group" style="display: none;">
                <span class="label">Player 2 Lap:</span>
                <div class="hud-value" id="hud-p2-lap">0/3</div>
                <span class="label">P2 Time:</span>
                <div class="hud-value" id="hud-p2-time">00.00</div>
            </div>

            <div class="control-group">
                <span class="label">Track:</span>
                <div class="hud-value" id="hud-track-name" style="min-width: 140px;">Track 1</div>
            </div>
        </div>

        <div id="canvas-container">
            <div id="status-overlay">3</div>
            <canvas id="raceCanvas"></canvas>
        </div>

        <div id="menu-overlay">
            <div class="menu-header">
                <h1 class="menu-title">ULTIMATE RACER</h1>
            </div>

            <div class="menu-grid">
                <div class="setup-pane">
                    <div class="pane-section">
                        <div class="section-title">Select Mode</div>
                        <div class="btn-stack">
                            <button id="mode-solo" class="btn active" onclick="setGameMode('solo')">1 Player</button>
                            <button id="mode-ai" class="btn" onclick="setGameMode('ai')">1 Player VS AI</button>
                            <button id="mode-versus" class="btn" onclick="setGameMode('versus')">2 Players</button>
                        </div>
                    </div>

                    <div class="pane-section" id="ai-difficulty-section" style="display: none;">
                        <div class="section-title">AI Driver Difficulty</div>
                        <div class="btn-stack">
                            <div class="btn-row">
                                <button id="ai-easy" class="btn active" onclick="setAiDifficulty('easy')">Easy</button>
                                <button id="ai-moderate" class="btn" onclick="setAiDifficulty('moderate')">Moderate</button>
                            </div>
                            <div class="btn-row">
                                <button id="ai-hard" class="btn" onclick="setAiDifficulty('hard')">Hard</button>
                                <button id="ai-insane" class="btn" onclick="setAiDifficulty('insane')">Insane</button>
                            </div>
                        </div>
                    </div>

                    <div class="launch-container">
                        <button class="btn btn-large btn-launch" onclick="launchRaceEvent()">Start Race</button>
                    </div>
                </div>

                <div class="tracks-pane">
                    <div class="section-title" style="margin-bottom: 15px;">Select Track</div>
                    <div class="tracks-list" id="tracks-list-container">
                        </div>
                </div>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('raceCanvas');
    const ctx = canvas.getContext('2d');
    const menuOverlay = document.getElementById('menu-overlay');
    const statusOverlay = document.getElementById('status-overlay');

    let activeMode = 'solo'; 
    let activeAiDiff = 'easy';
    let selectedTrackIndex = 0;
    let isRaceActive = false;
    let countdownActive = false;
    let raceStartTime = 0;

    const keys = {
        ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
        w: false, s: false, a: false, d: false,
        W: false, S: false, A: false, D: false
    };

    const CANVAS_W = 1918;
    const CANVAS_H = 986;

    const AI_PROFILES = {
        easy: { maxSpeed: 4.5, turnSpeed: 0.05 },
        moderate: { maxSpeed: 6.5, turnSpeed: 0.08 },
        hard: { maxSpeed: 8.5, turnSpeed: 0.11 },
        insane: { maxSpeed: 10.8, turnSpeed: 0.14 }
    };

    const TRACKS = [
        { name: "Track 1", nodes: [[200,200], [1700,200], [1700,800], [200,800]] },
        { name: "Track 2", nodes: [[150,250], [900,250], [950,500], [1750,500], [1750,850], [150,850]] },
        { name: "Track 3", nodes: [[300,180], [1600,180], [1600,450], [1200,450], [1200,800], [300,800]] },
        { name: "Track 4", nodes: [[150,150], [1750,150], [1750,450], [1100,450], [1100,850], [150,850]] },
        { name: "Track 5", nodes: [[200,200], [700,200], [900,500], [1700,200], [1700,800], [1000,800], [800,500], [200,800]] },
        { name: "Track 6", nodes: [[200,150], [1700,150], [1700,400], [1200,500], [1700,600], [1700,850], [200,850]] },
        { name: "Track 7", nodes: [[150,200], [1300,200], [1000,500], [1750,500], [1750,820], [150,820]] },
        { name: "Track 8", nodes: [[300,150], [1600,150], [1600,400], [1000,400], [1300,700], [1600,700], [1600,900], [300,900]] },
        { name: "Track 9", nodes: [[150,150], [1700,150], [1700,350], [400,350], [400,550], [1700,550], [1700,850], [150,850]] },
        { name: "Track 10", nodes: [[200,150], [900,150], [1100,350], [1700,350], [1700,850], [1000,850], [800,600], [200,860]] },
        { name: "Track 11", nodes: [[150,150], [1750,150], [1400,450], [1750,450], [1750,850], [150,850], [500,500], [150,500]] },
        { name: "Track 12", nodes: [[150,150], [900,150], [1100,850], [1750,850], [1750,150], [1200,150], [700,850], [150,850]] }
    ];

    let p1Vehicle, p2Vehicle, aiVehicle;
    let ghostData = []; 
    let activeGhostRun = null; 
    let currentRaceGhostIndex = 0;

    class Vehicle {
        constructor(x, y, angle, color, controlProfile, isAi = false) {
            this.x = x;
            this.y = y;
            this.angle = angle;
            this.color = color;
            this.controlProfile = controlProfile; 
            this.isAi = isAi;
            
            this.speed = 0;
            this.maxSpeed = 11.0;
            this.accel = 0.16;
            this.decel = 0.06;
            this.brake = 0.35;
            this.turnSpeed = 0.068; 
            this.radius = 14;

            this.currentLap = 0;
            this.nextGateIndex = 1;
            this.raceFinished = false;
            this.elapsedTime = 0;

            this.hasPassedCheckpoint = { 1: false, 2: false, 3: false };
        }

        update(trackNodes) {
            if (this.raceFinished) {
                this.speed *= 0.95;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                return;
            }

            if (!isRaceActive || countdownActive) return;

            let prevX = this.x;
            let prevY = this.y;

            if (this.isAi) {
                this.processAiLogic(trackNodes);
            } else {
                this.processHumanInputs();
            }

            this.x += Math.cos(this.angle) * this.speed;
            this.y += Math.sin(this.angle) * this.speed;

            let distanceToCircuit = getDistanceToTrackVector(this.x, this.y, trackNodes);
            if (distanceToCircuit > 45) {
                this.x = prevX;
                this.y = prevY;
                this.speed *= -0.4; 
            }

            this.evaluateCheckpointProgress(trackNodes);
        }

        processHumanInputs() {
            let up = false, down = false, left = false, right = false;

            if (this.controlProfile === 'arrows') {
                up = keys.ArrowUp; down = keys.ArrowDown; left = keys.ArrowLeft; right = keys.ArrowRight;
            } else if (this.controlProfile === 'wasd') {
                up = keys.w || keys.W; down = keys.s || keys.S; left = keys.a || keys.A; right = keys.d || keys.D;
            }

            if (up) {
                if (this.speed < 0) this.speed += this.brake;
                else this.speed = Math.min(this.speed + this.accel, this.maxSpeed);
            } else if (down) {
                if (this.speed > 0) this.speed -= this.brake;
                else this.speed = Math.max(this.speed - this.decel, -3.0);
            } else {
                if (this.speed > 0) this.speed = Math.max(this.speed - this.decel, 0);
                if (this.speed < 0) this.speed = Math.min(this.speed + this.decel, 0);
            }

            let calculatedTurn = this.turnSpeed * (0.65 + 0.35 * (1 - (Math.abs(this.speed) / this.maxSpeed)));
            if (left && Math.abs(this.speed) > 0.5) this.angle -= calculatedTurn * (this.speed > 0 ? 1 : -1);
            if (right && Math.abs(this.speed) > 0.5) this.angle += calculatedTurn * (this.speed > 0 ? 1 : -1);
        }

        processAiLogic(nodes) {
            let profile = AI_PROFILES[activeAiDiff];
            this.maxSpeed = profile.maxSpeed;

            let targetNode = nodes[this.nextGateIndex];
            let angleToTarget = Math.atan2(targetNode[1] - this.y, targetNode[0] - this.x);
            let angleDifference = angleToTarget - this.angle;

            while (angleDifference < -Math.PI) angleDifference += Math.PI * 2;
            while (angleDifference > Math.PI) angleDifference -= Math.PI * 2;

            if (Math.abs(angleDifference) > 0.05) {
                if (angleDifference > 0) this.angle += Math.min(profile.turnSpeed, angleDifference);
                else this.angle += Math.max(-profile.turnSpeed, angleDifference);
            }

            if (Math.abs(angleDifference) > 0.4) {
                this.speed = Math.max(this.speed - this.brake, 3.0);
            } else {
                this.speed = Math.min(this.speed + this.accel, this.maxSpeed);
            }
        }

        evaluateCheckpointProgress(nodes) {
            let totalNodesCount = nodes.length;
            
            let quarterMarker = Math.floor(totalNodesCount * 0.25) || 1;
            let halfMarker = Math.floor(totalNodesCount * 0.5) || 2;
            let threeQuarterMarker = Math.floor(totalNodesCount * 0.75) || 3;

            for (let i = 0; i < totalNodesCount; i++) {
                let nodeDist = Math.hypot(this.x - nodes[i][0], this.y - nodes[i][1]);
                if (nodeDist < 140) { 
                    if (i === quarterMarker) this.hasPassedCheckpoint[1] = true;
                    if (i === halfMarker) this.hasPassedCheckpoint[2] = true;
                    if (i === threeQuarterMarker) this.hasPassedCheckpoint[3] = true;
                }
            }

            let currentTarget = nodes[this.nextGateIndex];
            let dist = Math.hypot(this.x - currentTarget[0], this.y - currentTarget[1]);

            if (dist < 140) { 
                this.nextGateIndex = (this.nextGateIndex + 1) % nodes.length;
            }

            let finishLineDist = Math.hypot(this.x - nodes[0][0], this.y - nodes[0][1]);
            if (finishLineDist < 140) {
                if (this.hasPassedCheckpoint[1] && this.hasPassedCheckpoint[2] && this.hasPassedCheckpoint[3]) {
                    this.currentLap++;
                    
                    this.hasPassedCheckpoint[1] = false;
                    this.hasPassedCheckpoint[2] = false;
                    this.hasPassedCheckpoint[3] = false;
                    
                    this.nextGateIndex = 1;

                    if (this.currentLap >= 3) {
                        this.raceFinished = true;
                        this.elapsedTime = ((Date.now() - raceStartTime) / 1000).toFixed(2);
                        evaluateRaceCompletion();
                    }
                }
            }
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);

            ctx.fillStyle = "#000000";
            ctx.beginPath(); ctx.arc(-12, -11, 4, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(12, -11, 4, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(-12, 11, 4, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(12, 11, 4, 0, Math.PI * 2); ctx.fill();

            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.roundRect(-16, -9, 32, 18, [6, 10, 10, 6]);
            ctx.fill();

            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.roundRect(2, -5, 7, 10, 2);
            ctx.fill();

            ctx.fillStyle = "#1e293b";
            ctx.fillRect(-17, -11, 3, 22);

            ctx.restore();
        }
    }

    function initializeTracksDashboard() {
        const container = document.getElementById('tracks-list-container');
        container.innerHTML = '';

        TRACKS.forEach((track, idx) => {
            const card = document.createElement('div');
            card.className = `track-card ${idx === selectedTrackIndex ? 'selected' : ''}`;
            card.onclick = () => {
                document.querySelectorAll('.track-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedTrackIndex = idx;
            };

            card.innerHTML = `<div class="track-name">${track.name}</div>`;
            container.appendChild(card);
        });

        canvas.width = CANVAS_W;
        canvas.height = CANVAS_H;
        window.addEventListener('keydown', e => { if (e.key in keys) keys[e.key] = true; });
        window.addEventListener('keyup', e => { if (e.key in keys) keys[e.key] = false; });
    }

    function setGameMode(mode) {
        activeMode = mode;
        document.getElementById('mode-solo').classList.toggle('active', mode === 'solo');
        document.getElementById('mode-ai').classList.toggle('active', mode === 'ai');
        document.getElementById('mode-versus').classList.toggle('active', mode === 'versus');

        document.getElementById('ai-difficulty-section').style.display = mode === 'ai' ? 'block' : 'none';
        document.getElementById('hud-p2-group').style.display = mode === 'versus' ? 'flex' : 'none';
        
        document.getElementById('hud-p1-label').innerText = mode === 'versus' ? 'Player 1 Lap:' : 'Lap Display:';
        document.getElementById('hud-p1-time-label').innerText = mode === 'versus' ? 'P1 Time:' : 'Timer Clock:';
    }

    function setAiDifficulty(diff) {
        activeAiDiff = diff;
        ['easy', 'moderate', 'hard', 'insane'].forEach(d => {
            document.getElementById(`ai-${d}`).classList.toggle('active', d === diff);
        });
    }

    function launchRaceEvent() {
        menuOverlay.style.display = 'none';
        isRaceActive = true;
        countdownActive = true;

        let selectedCircuit = TRACKS[selectedTrackIndex];
        document.getElementById('hud-track-name').innerText = selectedCircuit.name;

        let startNode = selectedCircuit.nodes[0];
        let nextNode = selectedCircuit.nodes[1];
        let launchAngle = Math.atan2(nextNode[1] - startNode[1], nextNode[0] - startNode[0]);

        if (activeMode === 'solo') {
            p1Vehicle = new Vehicle(startNode[0], startNode[1], launchAngle, "#ef4444", "arrows");
            p2Vehicle = null; aiVehicle = null;
            currentRaceGhostIndex = 0;
        } else if (activeMode === 'ai') {
            p1Vehicle = new Vehicle(startNode[0] - 15, startNode[1] - 15, launchAngle, "#ef4444", "arrows");
            aiVehicle = new Vehicle(startNode[0] + 15, startNode[1] + 15, launchAngle, "#3b82f6", "ai", true);
            p2Vehicle = null;
        } else if (activeMode === 'versus') {
            p1Vehicle = new Vehicle(startNode[0] - 15, startNode[1] - 15, launchAngle, "#ef4444", "wasd");
            p2Vehicle = new Vehicle(startNode[0] + 15, startNode[1] + 15, launchAngle, "#3b82f6", "arrows");
            aiVehicle = null;
        }

        let count = 3;
        statusOverlay.innerText = count;
        statusOverlay.style.display = 'block';

        let counterLoop = setInterval(() => {
            count--;
            if (count === 0) {
                statusOverlay.innerText = "GO!";
                countdownActive = false;
                raceStartTime = Date.now();
                if (activeMode === 'solo') ghostData = [];
            } else if (count < 0) {
                clearInterval(counterLoop);
                statusOverlay.style.display = 'none';
            } else {
                statusOverlay.innerText = count;
            }
        }, 1000);
    }

    function evaluateRaceCompletion() {
        if (activeMode === 'solo' && p1Vehicle.raceFinished) {
            endRaceSequence(`FINISH! TIME: ${p1Vehicle.elapsedTime}s`);
            if (ghostData.length > 0) activeGhostRun = [...ghostData];
        } else if (activeMode === 'ai') {
            if (p1Vehicle.raceFinished) endRaceSequence(`RED PLAYER WINS! TIME: ${p1Vehicle.elapsedTime}s`);
            else if (aiVehicle.raceFinished) endRaceSequence(`AI DRIVER WINS! TIME: ${aiVehicle.elapsedTime}s`);
        } else if (activeMode === 'versus') {
            if (p1Vehicle.raceFinished) endRaceSequence(`RED PLAYER WINS! TIME: ${p1Vehicle.elapsedTime}s`);
            else if (p2Vehicle.raceFinished) endRaceSequence(`BLUE PLAYER WINS! TIME: ${p2Vehicle.elapsedTime}s`);
        }
    }

    function endRaceSequence(headlineText) {
        isRaceActive = false;
        statusOverlay.innerText = headlineText;
        statusOverlay.style.display = 'block';
        
        setTimeout(() => {
            exitToMainMenu();
        }, 5000);
    }

    function exitToMainMenu() {
        isRaceActive = false;
        countdownActive = false;
        statusOverlay.style.display = 'none';
        menuOverlay.style.display = 'flex';
        
        document.getElementById('hud-p1-lap').innerText = "0/3";
        document.getElementById('hud-p1-time').innerText = "00.00";
        document.getElementById('hud-p2-lap').innerText = "0/3";
        document.getElementById('hud-p2-time').innerText = "00.00";
    }

    function drawRacetrackLayout() {
        let currentTrack = TRACKS[selectedTrackIndex];
        let nodes = currentTrack.nodes;

        ctx.fillStyle = "#166534"; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 104;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.beginPath();
        nodes.forEach((n, idx) => {
            if (idx === 0) ctx.moveTo(n[0], n[1]);
            else ctx.lineTo(n[0], n[1]);
        });
        ctx.closePath();
        ctx.stroke();

        ctx.strokeStyle = "#dc2626"; 
        ctx.setLineDash([25, 25]); 
        ctx.stroke();
        ctx.setLineDash([]); 

        ctx.strokeStyle = "#1e293b"; 
        ctx.lineWidth = 90;
        ctx.stroke();

        ctx.strokeStyle = "rgba(255, 255, 255, 0.2)";
        ctx.lineWidth = 2;
        ctx.setLineDash([20, 30]);
        ctx.stroke();
        ctx.setLineDash([]);

        let startNode = nodes[0];
        let secondNode = nodes[1];
        let headingAngle = Math.atan2(secondNode[1] - startNode[1], secondNode[0] - startNode[0]);

        ctx.save();
        ctx.translate(startNode[0], startNode[1]);
        ctx.rotate(headingAngle);
        
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(-6, -45, 12, 90);
        ctx.fillStyle = "#000000";
        for (let b = -45; b < 45; b += 15) {
            if ((b / 15) % 2 === 0) ctx.fillRect(-6, b, 6, 15);
            else ctx.fillRect(0, b, 6, 15);
        }
        ctx.restore();
    }

    function getDistanceToTrackVector(px, py, nodes) {
        let minimumTrackDist = Infinity;
        for (let i = 0; i < nodes.length; i++) {
            let nA = nodes[i];
            let nB = nodes[(i + 1) % nodes.length];

            let dx = nB[0] - nA[0];
            let dy = nB[1] - nA[1];
            let t = ((px - nA[0]) * dx + (py - nA[1]) * dy) / (dx * dx + dy * dy);
            t = Math.max(0, Math.min(1, t));

            let projX = nA[0] + t * dx;
            let projY = nA[1] + t * dy;
            let currentSegmentDistance = Math.hypot(px - projX, py - projY);
            
            if (currentSegmentDistance < minimumTrackDist) minimumTrackDist = currentSegmentDistance;
        }
        return minimumTrackDist;
    }

    function runTickUpdateLoop() {
        if (isRaceActive) {
            if (p1Vehicle) p1Vehicle.update(TRACKS[selectedTrackIndex].nodes);
            if (p2Vehicle) p2Vehicle.update(TRACKS[selectedTrackIndex].nodes);
            if (aiVehicle) aiVehicle.update(TRACKS[selectedTrackIndex].nodes);

            let curTime = "00.00";
            if (!countdownActive && raceStartTime > 0) {
                curTime = ((Date.now() - raceStartTime) / 1000).toFixed(2);
            }

            if (p1Vehicle) {
                document.getElementById('hud-p1-lap').innerText = `${Math.min(p1Vehicle.currentLap, 3)}/3`;
                document.getElementById('hud-p1-time').innerText = p1Vehicle.raceFinished ? p1Vehicle.elapsedTime : curTime;
                
                if (activeMode === 'solo' && !countdownActive && !p1Vehicle.raceFinished) {
                    ghostData.push({x: p1Vehicle.x, y: p1Vehicle.y, angle: p1Vehicle.angle});
                }
            }

            if (p2Vehicle) {
                document.getElementById('hud-p2-lap').innerText = `${Math.min(p2Vehicle.currentLap, 3)}/3`;
                document.getElementById('hud-p2-time').innerText = p2Vehicle.raceFinished ? p2Vehicle.elapsedTime : curTime;
            }
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawRacetrackLayout();

        if (activeMode === 'solo' && activeGhostRun && isRaceActive && !countdownActive) {
            if (currentRaceGhostIndex < activeGhostRun.length) {
                let ghostSnapshot = activeGhostRun[currentRaceGhostIndex];
                ctx.save();
                ctx.translate(ghostSnapshot.x, ghostSnapshot.y);
                ctx.rotate(ghostSnapshot.angle);
                ctx.fillStyle = "rgba(255, 255, 255, 0.35)"; 
                ctx.beginPath(); ctx.roundRect(-16, -9, 32, 18, 6); ctx.fill();
                ctx.restore();
                if (!p1Vehicle.raceFinished) currentRaceGhostIndex++;
            }
        }

        if (p1Vehicle) p1Vehicle.draw();
        if (p2Vehicle) p2Vehicle.draw();
        if (aiVehicle) aiVehicle.draw();

        requestAnimationFrame(runTickUpdateLoop);
    }

    window.onload = () => {
        initializeTracksDashboard();
        setGameMode('solo');
        runTickUpdateLoop();
    };
</script>
