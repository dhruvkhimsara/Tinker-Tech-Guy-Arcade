<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong</title>
    <style>
        :root {
            --bg-black: #050505;
            --accent-green: #00ff88;
            --panel-grey: #141416;
            --text-muted: #a1a1aa;
            --border-color: #27272a;
        }

        /* Forces full screen layout environment but hides overflow scrolls */
        html, body {
            background-color: #000000;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
        }

        /* The master framework component containing everything inside the strict 1080p outer border */
        #game-wrapper {
            width: 1920px;
            height: 1080px;
            background-color: var(--bg-black);
            display: flex;
            flex-direction: column;
            border: 1px solid #ffffff; /* Clean white border completely framing the whole game stretch */
            box-sizing: border-box;
            position: relative;
        }

        /* Arcade Interface Header Area */
        #game-controls {
            height: 90px;
            background-color: var(--panel-grey);
            border-bottom: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 40px;
            box-sizing: border-box;
            flex-shrink: 0;
            z-index: 20;
        }

        .control-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .label {
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
        }

        .btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover, .btn.active {
            color: #ffffff;
            border-color: var(--accent-green);
            background-color: rgba(0, 255, 136, 0.05);
        }

        .btn.active {
            box-shadow: 0 0 12px rgba(0, 255, 136, 0.2);
        }

        /* Match Point Banner overlay */
        #screen-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent-green);
            display: none;
            z-index: 10;
        }

        /* Arena Layout Field Box Area */
        #canvas-container {
            flex: 1;
            background-color: var(--bg-black);
            position: relative;
            margin: 0;
            padding: 0;
        }

        canvas {
            display: block;
            background-color: var(--bg-black);
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        
        <div id="game-controls">
            <div class="control-group">
                <span class="label">Mode:</span>
                <button id="btn-1p" class="btn active" onclick="setMode(1)">1 Player</button>
                <button id="btn-2p" class="btn" onclick="setMode(2)">2 Players</button>
            </div>

            <div class="control-group" id="difficulty-wrapper">
                <span class="label">AI Difficulty:</span>
                <button id="ai-easy" class="btn active" onclick="setDifficulty('easy')">Easy</button>
                <button id="ai-moderate" class="btn" onclick="setDifficulty('moderate')">Moderate</button>
                <button id="ai-hard" class="btn" onclick="setDifficulty('hard')">Hard</button>
                <button id="ai-insane" class="btn" onclick="setDifficulty('insane')">Insane</button>
            </div>
        </div>

        <div id="canvas-container">
            <div id="screen-overlay">Player 1 Wins!</div>
            <canvas id="pongCanvas"></canvas>
        </div>

    </div>

<script>
    const canvas = document.getElementById('pongCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('screen-overlay');

    // System Variables
    let gameMode = 1; 
    let aiDifficulty = 'easy';
    let gameOver = false;

    // Trackers for keys input channels
    const keys = { w: false, s: false, ArrowUp: false, ArrowDown: false };

    // Standard Game Dimensions Design parameters
    const padW = 15;
    const padH = 130;
    const ballSize = 14;
    const baseSpeed = 9;
    const maxSpeedBoost = 12; 

    // Paddles and Ball entities blueprints
    let player1 = { x: 0, y: 0, score: 0 }; 
    let player2 = { x: 0, y: 0, score: 0 }; 
    let ball = { x: 0, y: 0, vx: 0, vy: 0, currentSpeed: baseSpeed };

    // Interpolation rates to preserve absolute visual smoothness (No jittering locks)
    const aiConfig = {
        easy:     { speed: 5.5, threshold: 22 },
        moderate: { speed: 8.5, threshold: 14 },
        hard:     { speed: 13,   threshold: 5  },
        insane:   { speed: 38,   threshold: 1  } 
    };

    function initPositions() {
        // Force rendering buffer context to absolute width footprint parameters
        canvas.width = 1918; // Accounts perfectly inside the 1px left/right borders
        canvas.height = 986; // Accounts perfectly inside the 1px bottom border + 90px header

        player1.x = 0; 
        player1.y = canvas.height / 2 - padH / 2;
        
        player2.x = canvas.width - padW; 
        player2.y = canvas.height / 2 - padH / 2;
        
        resetBall(1);
    }

    function resetBall(servingPlayer) {
        ball.x = canvas.width / 2;
        ball.y = canvas.height / 2;
        ball.currentSpeed = baseSpeed;
        
        let angle = (Math.random() * 40 - 20) * Math.PI / 180; 
        let dir = servingPlayer === 1 ? 1 : -1;
        
        ball.vx = dir * ball.currentSpeed * Math.cos(angle);
        ball.vy = ball.currentSpeed * Math.sin(angle);
    }

    window.addEventListener('keydown', e => { if (e.key in keys) keys[e.key] = true; });
    window.addEventListener('keyup', e => { if (e.key in keys) keys[e.key] = false; });

    function setMode(mode) {
        gameMode = mode;
        document.getElementById('btn-1p').classList.toggle('active', mode === 1);
        document.getElementById('btn-2p').classList.toggle('active', mode === 2);
        document.getElementById('difficulty-wrapper').style.opacity = mode === 1 ? '1' : '0.2';
        document.getElementById('difficulty-wrapper').style.pointerEvents = mode === 1 ? 'auto' : 'none';
        
        // Always hard-reset the match states and score values immediately on mode change
        resetMatch();
    }

    function setDifficulty(diff) {
        aiDifficulty = diff;
        ['easy', 'moderate', 'hard', 'insane'].forEach(d => {
            document.getElementById(`ai-${d}`).classList.toggle('active', d === diff);
        });
        
        // Always hard-reset the match states and score values immediately on difficulty change
        resetMatch();
    }

    function updatePhysics() {
        if (gameOver) return;

        const paddleMoveSpeed = 12;

        // --- SINGLE / MULTIPLAYER CONTROL ROUTINES ---
        if (gameMode === 1) {
            // Single Player Ruleset: Player 1 Uses Arrows
            if (keys.ArrowUp && player1.y > 0) player1.y -= paddleMoveSpeed;
            if (keys.ArrowDown && player1.y < canvas.height - padH) player1.y += paddleMoveSpeed;

            // Stable non-jitter tracking AI framework calculations
            let config = aiConfig[aiDifficulty];
            let paddleCenter = player2.y + padH / 2;
            let targetDiff = ball.y - paddleCenter;

            if (Math.abs(targetDiff) > config.threshold) {
                if (targetDiff > 0) {
                    player2.y += Math.min(config.speed, targetDiff);
                } else {
                    player2.y += Math.max(-config.speed, targetDiff);
                }
            }
            // Protect extreme boundary edges limits
            if (player2.y < 0) player2.y = 0;
            if (player2.y > canvas.height - padH) player2.y = canvas.height - padH;

        } else {
            // Multiplayer Ruleset: P1 (Left) is WASD, P2 (Right) is Arrow Keys
            if (keys.w && player1.y > 0) player1.y -= paddleMoveSpeed;
            if (keys.s && player1.y < canvas.height - padH) player1.y += paddleMoveSpeed;

            if (keys.ArrowUp && player2.y > 0) player2.y -= paddleMoveSpeed;
            if (keys.ArrowDown && player2.y < canvas.height - padH) player2.y += paddleMoveSpeed;
        }

        // Ball movement coordinates updating
        ball.x += ball.vx;
        ball.y += ball.vy;

        // Upper and lower boundary hit responses
        if (ball.y <= ballSize || ball.y >= canvas.height - ballSize) {
            ball.vy *= -1;
            ball.y = ball.y <= ballSize ? ballSize : canvas.height - ballSize;
        }

        // Left Paddle impact evaluations matrix
        if (ball.vx < 0 && ball.x - ballSize <= player1.x + padW && ball.x + ballSize >= player1.x) {
            if (ball.y >= player1.y && ball.y <= player1.y + padH) {
                processPaddleCollision(player1);
            }
        }

        // Right Paddle impact evaluations matrix
        if (ball.vx > 0 && ball.x + ballSize >= player2.x && ball.x - ballSize <= player2.x + padW) {
            if (ball.y >= player2.y && ball.y <= player2.y + padH) {
                processPaddleCollision(player2);
            }
        }

        // Side boundary scoring conditions loops
        if (ball.x < 0) {
            player2.score++;
            checkScore(2);
        } else if (ball.x > canvas.width) {
            player1.score++;
            checkScore(1);
        }
    }

    function processPaddleCollision(paddle) {
        let paddleCenter = paddle.y + padH / 2;
        let relativeIntersectY = paddleCenter - ball.y; 
        let normalizedIntersectY = (relativeIntersectY / (padH / 2));
        
        let bounceAngle = normalizedIntersectY * (Math.PI / 3);
        let absoluteOffset = Math.abs(normalizedIntersectY); 
        
        // Dynamic edge hit processing acceleration rules calculation
        ball.currentSpeed = baseSpeed + (absoluteOffset * maxSpeedBoost);
        
        let direction = ball.vx > 0 ? -1 : 1;
        ball.vx = direction * ball.currentSpeed * Math.cos(bounceAngle);
        ball.vy = ball.currentSpeed * -Math.sin(bounceAngle);
        
        // Prevent ball clip multi-frame sticky physics glitches
        if (direction === 1) ball.x = player1.x + padW + ballSize;
        else ball.x = player2.x - ballSize;
    }

    function checkScore(scoringPlayer) {
        if (player1.score >= 10 || player2.score >= 10) {
            gameOver = true;
            if (gameMode === 1 && player2.score === 10) {
                overlay.innerText = "AI ENGINE WINS!";
            } else {
                overlay.innerText = `PLAYER ${player1.score === 10 ? '1' : '2'} WINS!`;
            }
            overlay.style.display = 'block';
            setTimeout(resetMatch, 4000);
        } else {
            resetBall(scoringPlayer === 1 ? 2 : 1);
        }
    }

    function resetMatch() {
        player1.score = 0;
        player2.score = 0;
        gameOver = false;
        overlay.style.display = 'none';
        initPositions();
    }

    function renderScreen() {
        // Background reset frame array buffer
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Net separation layout line markings configurations
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
        ctx.lineWidth = 4;
        ctx.setLineDash([15, 15]);
        ctx.beginPath();
        ctx.moveTo(canvas.width / 2, 0);
        ctx.lineTo(canvas.width / 2, canvas.height);
        ctx.stroke();
        ctx.setLineDash([]); 

        // Big background score indicators channels rendering
        ctx.fillStyle = 'rgba(255, 255, 255, 0.06)';
        ctx.font = '900 160px -apple-system, BlinkMacSystemFont, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(player1.score, canvas.width / 2 - 100, canvas.height / 2 + 60);
        ctx.textAlign = 'left';
        ctx.fillText(player2.score, canvas.width / 2 + 100, canvas.height / 2 + 60);

        // Draw Paddles
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(player1.x, player1.y, padW, padH);
        ctx.fillRect(player2.x, player2.y, padW, padH);

        // Draw Ball
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ballSize, 0, Math.PI * 2);
        ctx.fill();
    }

    function gameLoop() {
        updatePhysics();
        renderScreen();
        requestAnimationFrame(gameLoop);
    }

    window.onload = () => {
        initPositions();
        gameLoop();
    };
</script>
</body>
</html>
